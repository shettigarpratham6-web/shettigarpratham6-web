<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratham Shettigar</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:#0D1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:550px;
text-align:center;
}





h1{
font-size:24px;
margin-bottom:4px;
}

p{
font-size:13px;
color:#cbd5e1;
}

/* Sections */

section{
background:#161B22;
margin-top:12px;
padding:14px;
border-radius:6px;
border:1px solid #30363d;
}

h2{
font-size:16px;
margin-bottom:10px;
border-bottom:1px solid #1565c0;
padding-bottom:5px;
}

/* Skills */

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.skill{
border:1px solid #1565c0;
padding:6px 10px;
font-size:12px;
border-radius:6px;
transition:0.2s;
}

.skill:hover{
background:#1565c0;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">



<section>
<h2>⚡ Tech Stack</h2>

<div class="skills">
<div class="skill">C</div>
<div class="skill">C++</div>
<div class="skill">Python</div>
<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">Tailwind</div>
<div class="skill">JavaScript</div>
<div class="skill">React</div>
<div class="skill">Vite</div>
<div class="skill">Next.js</div>
<div class="skill">NumPy</div>
<div class="skill">Pandas</div>
<div class="skill">Tkinter</div>
<div class="skill">pyttsx3</div>
</div>

</section>

<section>
<h2>🛠 Tools</h2>

<div class="skills">
<div class="skill">Firebase</div>
<div class="skill">Git</div>
</div>

</section>

<section>
<h2>📚 Learning</h2>

<div class="skills">
<div class="skill">DSA</div>
<div class="skill">Advanced React</div>
<div class="skill">Backend</div>
</div>

</section>

</div>

</body>
</html>
